services:
  - type: web
    name: building-energy-app
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: |
      apt-get update && apt-get install -y build-essential
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: LLM_PROVIDER
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
